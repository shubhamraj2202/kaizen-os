<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Center circle -->
  <circle cx="50" cy="50" r="14" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <!-- 8 teeth -->
  <rect x="46" y="10" width="8" height="14" rx="4" fill="#FFFFFF"/>
  <rect x="46" y="76" width="8" height="14" rx="4" fill="#FFFFFF"/>
  <rect x="10" y="46" width="14" height="8" rx="4" fill="#FFFFFF"/>
  <rect x="76" y="46" width="14" height="8" rx="4" fill="#FFFFFF"/>
  <!-- Diagonal teeth -->
  <rect x="20" y="18" width="8" height="14" rx="4" fill="#FFFFFF" opacity="0.65"
    transform="rotate(45 24 25)"/>
  <rect x="70" y="18" width="8" height="14" rx="4" fill="#FFFFFF" opacity="0.65"
    transform="rotate(-45 74 25)"/>
  <rect x="20" y="68" width="8" height="14" rx="4" fill="#FFFFFF" opacity="0.65"
    transform="rotate(-45 24 75)"/>
  <rect x="70" y="68" width="8" height="14" rx="4" fill="#FFFFFF" opacity="0.65"
    transform="rotate(45 74 75)"/>
</svg>
