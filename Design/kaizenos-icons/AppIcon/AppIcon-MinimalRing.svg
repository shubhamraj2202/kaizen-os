<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0D1321"/>
  <!-- Track ring -->
  <circle cx="512" cy="486" r="274" fill="none" stroke="#1A2540" stroke-width="86"/>
