  <!-- Today label -->
  <text x="512" y="566" text-anchor="middle"
    font-family="-apple-system,'SF Pro Display',sans-serif"
    font-size="68" fill="#00E5C8" letter-spacing="8">TODAY</text>
  <!-- App name -->
  <text x="512" y="880" text-anchor="middle"
