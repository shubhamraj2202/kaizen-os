<svg width="338" height="338" viewBox="0 0 338 338" xmlns="http://www.w3.org/2000/svg">
  <rect width="338" height="338" rx="56" fill="#0D1321"/>
  <!-- Progress ring track -->
  <circle cx="110" cy="169" r="70" fill="none" stroke="#1A2540" stroke-width="20"/>
