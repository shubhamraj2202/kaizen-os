  <text x="110" y="161" text-anchor="middle"
    font-family="-apple-system,'SF Pro Display',sans-serif"
    font-size="30" font-weight="700" fill="#FFFFFF">71%</text>
  <text x="110" y="185" text-anchor="middle"
    font-family="-apple-system,'SF Pro Display',sans-serif"
    font-size="17" fill="#00E5C8" letter-spacing="1">TODAY</text>
  <!-- Divider -->
  <line x1="200" y1="90" x2="200" y2="248" stroke="#1A2540" stroke-width="1.5"/>
  <!-- Streak block -->
  <text x="269" y="128" text-anchor="middle"
    font-family="-apple-system,'SF Pro Display',sans-serif"
    font-size="19" fill="#FFFFFF" opacity="0.4" letter-spacing="1">STREAK</text>
  <text x="258" y="165" text-anchor="middle"
    font-family="-apple-system,'SF Pro Display',sans-serif"
    font-size="46" font-weight="700" fill="#FF8C42">12</text>
  <!-- Flame shape -->
  <ellipse cx="298" cy="152" rx="14" ry="20" fill="#FF8C42"/>
  <ellipse cx="298" cy="163" rx="9" ry="11" fill="#FF6B6B"/>
  <circle cx="298" cy="169" r="6" fill="#FFCC00"/>
  <!-- Divider horizontal -->
  <line x1="212" y1="188" x2="326" y2="188" stroke="#1A2540" stroke-width="1.5"/>
